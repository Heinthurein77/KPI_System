{% extends "base.html" %}
{% block title %}Sign in{% endblock %}
{% block guest_content %}
<div class="min-h-screen flex items-center justify-center bg-slate-50 px-4">
    <div class="w-full max-w-sm">
        <div class="flex items-center justify-center gap-2 mb-8">
            <div class="h-10 w-10 rounded-xl bg-brand-500 flex items-center justify-center font-bold text-white text-lg">K</div>
            <span class="text-xl font-semibold text-slate-900">KPI System</span>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 px-8 py-8">
            <h1 class="text-xl font-semibold text-slate-900 mb-1">Welcome back</h1>
            <p class="text-sm text-slate-500 mb-6">Sign in to manage your KPI submissions.</p>

            {% if error %}
            <div class="mb-4 rounded-lg bg-red-50 border border-red-200 px-3 py-2 text-sm text-red-700">
                {{ error }}
            </div>
            {% endif %}

            <form action="/login" method="post" class="space-y-4">
                <div>
                    <label for="email" class="block text-sm font-medium text-slate-700 mb-1">Email</label>
                    <input id="email" name="email" type="email" required autofocus
                           class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500"
                           placeholder="you@company.com" />
                </div>
                <div>
                    <label for="password" class="block text-sm font-medium text-slate-700 mb-1">Password</label>
                    <input id="password" name="password" type="password" required
                           class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500"
                           placeholder="••••••••" />
                </div>
                <button type="submit"
                        class="w-full rounded-lg bg-brand-600 px-4 py-2.5 text-sm font-semibold text-white hover:bg-brand-700 transition">
                    Sign in
                </button>
            </form>
        </div>

    </div>
</div>
{% endblock %}
