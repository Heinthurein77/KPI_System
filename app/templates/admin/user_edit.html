{% extends "base.html" %}
{% block title %}Edit User{% endblock %}
{% block page_title %}Edit User{% endblock %}

{% block content %}
<div class="max-w-lg">
    {% if error %}
    <div class="mb-4 rounded-lg bg-red-50 border border-red-200 px-4 py-3 text-sm text-red-700">
        {{ error }}
    </div>
    {% endif %}

    <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-6">
        <div class="flex items-center gap-3 mb-6">
            <div class="h-10 w-10 shrink-0 rounded-full bg-gradient-to-br from-brand-500 to-brand-700 text-white flex items-center justify-center text-sm font-semibold">
                {{ target.name[:1]|upper }}
            </div>
            <div>
                <h2 class="text-sm font-semibold text-slate-900">{{ target.name }}</h2>
                <p class="text-xs text-slate-500">{{ target.email }}</p>
            </div>
        </div>

        <form action="/admin/users/{{ target.id }}/edit" method="post" class="space-y-4">
            <div>
                <label class="block text-[11px] font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Full name</label>
                <input type="text" name="name" required value="{{ target.name }}"
                       class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500 transition" />
            </div>
            <div>
                <label class="block text-[11px] font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Email</label>
                <input type="email" name="email" required value="{{ target.email }}"
                       class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500 transition" />
            </div>
            <div>
                <label class="block text-[11px] font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Role</label>
                <select name="role" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500 transition">
                    {% for r in roles %}
                    <option value="{{ r.value }}" {% if r == target.role %}selected{% endif %}>{{ r.value.replace('_', ' ')|title }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label class="block text-[11px] font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Department</label>
                <select name="department_id" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500 transition">
                    <option value="">No department (Super Admin)</option>
                    {% for d in departments %}
                    <option value="{{ d.id }}" {% if target.department_id == d.id %}selected{% endif %}>{{ d.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label class="block text-[11px] font-semibold text-slate-500 uppercase tracking-wide mb-1.5">New password</label>
                <input type="password" name="password" placeholder="Leave blank to keep current password"
                       class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500 transition" />
            </div>

            <div class="flex items-center gap-3 pt-2">
                <button type="submit" class="inline-flex items-center gap-1.5 rounded-lg bg-brand-600 px-4 py-2.5 text-sm font-semibold text-white shadow-sm hover:bg-brand-700 transition">
                    <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="m4.5 12.75 6 6 9-13.5"/></svg>
                    Save Changes
                </button>
                <a href="/admin/users" class="rounded-lg border border-slate-300 bg-white px-4 py-2.5 text-sm font-medium text-slate-700 hover:bg-slate-50 transition">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
