services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: kpi
      POSTGRES_PASSWORD: kpi
      POSTGRES_DB: kpi_system
    ports:
      - "5432:5432"
    volumes:
      - kpi_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kpi"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      ENVIRONMENT: production
      SECRET_KEY: dev-only-secret-change-me
      DATABASE_URL: postgresql://kpi:kpi@db:5432/kpi_system
    depends_on:
      db:
        condition: service_healthy

volumes:
  kpi_pg_data:
